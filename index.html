<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hardened CSP: no unsafe-inline, no unsafe-eval -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://cdnjs.cloudflare.com;">
    <title>政府預算查填匯總系統 v4.0.0 (CSP 強化版)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="budget-style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="budget-app.js"></script>
</head>
<body>

<nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-xl">🇹🇼</div>
            <div>
                <h1 class="font-bold text-lg text-slate-800 leading-tight">政府預算查填匯總平臺</h1>
                <p class="text-xs text-slate-500">v4.0.0 (CSP 強化 + 自動儲存 + Undo)</p>
            </div>
        </div>
        <div class="tab-pill-container bg-slate-100 p-1 rounded-full flex gap-1">
            <button id="btn-manager" class="px-6 py-2 rounded-full font-bold transition active bg-white shadow-sm">📝 填報站</button>
            <button id="btn-aggregator" class="px-6 py-2 rounded-full font-bold transition text-slate-500">📊 匯整端</button>
        </div>
    </div>
</nav>

<div id="tab-manager" class="max-w-[98%] mx-auto p-4 block">
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <h2 class="text-2xl font-bold text-slate-800">預算填報工作站</h2>
            <span class="animate-pulse bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-full font-bold border border-blue-200">✨ 支援 Excel 貼上</span>
            <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-bold border border-green-200">💾 自動儲存</span>
        </div>
        <div class="flex gap-2">
            <button id="btn-import" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold border hover:bg-slate-200">📂 匯入舊檔</button>
            <input type="file" id="mgr-import-file" class="hidden" accept=".json,.html">
            <button id="btn-export-json" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-blue-700">💾 匯出 JSON</button>
            <button id="btn-export-html" class="bg-teal-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow">🌍 備份 HTML</button>
            <button id="btn-export-xlsx" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-green-700">📊 匯出 Excel</button>
            <button id="btn-clear" class="text-red-500 px-3 py-2 border rounded-lg text-sm hover:bg-red-50">🗑️ 清空</button>
        </div>
    </div>

    <div class="excel-guide flex items-center gap-2">
        <span>💡</span>
        <span><b>操作提示：</b>您可以從 Excel 選取整塊資料區域按下 <kbd class="bg-white px-1 border rounded">Ctrl+C</kbd>，點擊下方表單任一格子按下 <kbd class="bg-white px-1 border rounded">Ctrl+V</kbd> 即可快速填入多列數據。按 <kbd class="bg-white px-1 border rounded">Tab</kbd> 跳至下一格，<kbd class="bg-white px-1 border rounded">Enter</kbd> 跳至下一列。</span>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div><label class="text-xs font-bold text-slate-400 uppercase">機關名稱</label><input type="text" id="mgr-org" class="border-b-2 w-full p-2 outline-none font-bold focus:border-blue-500"></div>
        <div><label class="text-xs font-bold text-slate-400 uppercase">年度</label><input type="number" id="mgr-year" class="border-b-2 w-full p-2 outline-none" value="115"></div>
        <div><label class="text-xs font-bold text-slate-400 uppercase">填表人</label><input type="text" id="mgr-user" class="border-b-2 w-full p-2 outline-none" placeholder="姓名"></div>
    </div>
    <div id="sections-container"></div>
</div>

<div id="tab-aggregator" class="max-w-[98%] mx-auto p-6 hidden bg-[#0f172a] min-h-screen text-white rounded-xl mt-4">
    <!-- 1. Upload Zone -->
    <div class="mb-8">
        <div id="agg-dropzone" class="upload-zone rounded-2xl p-8 text-center cursor-pointer" style="border: 3px dashed #3b82f6; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);">
            <svg class="mx-auto h-16 w-16 text-blue-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <p class="text-xl font-semibold text-blue-400 mb-2">點擊或拖曳 JSON/HTML 檔案至此</p>
            <p class="text-sm text-slate-400">支援多檔案上傳</p>
        </div>
    </div>

    <!-- 2. Stats Cards -->
    <section id="agg-stats" class="mb-8 hidden">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="agg-kpi"></div>
    </section>

    <!-- 3. Filter Section -->
    <section id="agg-filter" class="mb-8 hidden" style="background: #1e293b; border-radius: 1rem; padding: 1.5rem; border: 2px solid #334155;">
        <h2 class="text-xl font-bold mb-4">🔍 篩選與查詢</h2>
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-4">
            <div>
                <label class="field-label block" style="font-weight: 600; color: #e2e8f0; margin-bottom: 0.25rem;">年度</label>
                <select id="agg-filter-year" class="filter-input" style="padding: 0.75rem 1rem; border: 2px solid #475569; border-radius: 0.5rem; font-size: 0.95rem; background: #0f172a; color: white; width: 100%;">
                    <option value="">全部年度</option>
                </select>
            </div>
            <div>
                <label class="field-label block" style="font-weight: 600; color: #e2e8f0; margin-bottom: 0.25rem;">機關/縣市</label>
                <select id="filter-org" class="filter-input" style="padding: 0.75rem 1rem; border: 2px solid #475569; border-radius: 0.5rem; font-size: 0.95rem; background: #0f172a; color: white; width: 100%;">
                    <option value="">全部機關</option>
                </select>
            </div>
            <div>
                <label class="field-label block" style="font-weight: 600; color: #e2e8f0; margin-bottom: 0.25rem;">基金類型</label>
                <select id="filter-section" class="filter-input" style="padding: 0.75rem 1rem; border: 2px solid #475569; border-radius: 0.5rem; font-size: 0.95rem; background: #0f172a; color: white; width: 100%;">
                    <option value="">全部類型</option>
                </select>
            </div>
            <div>
                <label class="field-label block" style="font-weight: 600; color: #e2e8f0; margin-bottom: 0.25rem;">基金名稱</label>
                <select id="filter-name" class="filter-input" style="padding: 0.75rem 1rem; border: 2px solid #475569; border-radius: 0.5rem; font-size: 0.95rem; background: #0f172a; color: white; width: 100%;">
                    <option value="">全部基金</option>
                </select>
            </div>
            <div>
                <label class="field-label block" style="font-weight: 600; color: #e2e8f0; margin-bottom: 0.25rem;">會計科目</label>
                <select id="filter-field" class="filter-input" style="padding: 0.75rem 1rem; border: 2px solid #475569; border-radius: 0.5rem; font-size: 0.95rem; background: #0f172a; color: white; width: 100%;">
                    <option value="">全部科目</option>
                </select>
            </div>
        </div>
        <div class="flex flex-wrap gap-3">
            <button id="btn-agg-clear" class="btn-danger" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; border: none; cursor: pointer;">🗑️ 清除全部</button>
        </div>
    </section>

    <!-- 4. Data Table -->
    <section id="agg-content" class="hidden">
        <div class="mb-4 flex justify-between items-center">
            <h2 class="text-xl font-bold text-white">📋 匯入資料總覽</h2>
            <span class="text-slate-400 font-medium">共 <span id="agg-display-count">0</span> 筆資料</span>
        </div>
        <div id="agg-list-area" class="bg-slate-800 p-6 rounded-xl border border-slate-700" style="max-height: 500px; overflow-y: auto;">
            <table class="w-full text-left text-sm" style="border-collapse: collapse;">
                <thead>
                    <tr style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);">
                        <th style="padding: 1rem; font-weight: 600;">編號</th>
                        <th style="padding: 1rem; font-weight: 600;">機關名稱</th>
                        <th style="padding: 1rem; font-weight: 600;">基金數</th>
                        <th style="padding: 1rem; font-weight: 600;">操作</th>
                    </tr>
                </thead>
                <tbody id="agg-list-body"></tbody>
            </table>
        </div>
    </section>

    <!-- Empty State -->
    <section id="agg-empty" class="text-center py-16">
        <svg class="mx-auto h-24 w-24 text-slate-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <p class="text-xl text-slate-400">尚未匯入資料</p>
        <p class="text-sm text-slate-500 mt-2">請上傳 JSON 或 HTML 檔案以開始分析</p>
    </section>
</div>

<!-- Autosave indicator -->
<div id="autosave-indicator" class="autosave-indicator">✓ 已自動儲存</div>

<!-- Undo button (no inline onclick) -->
<button id="undo-btn" class="undo-btn">↩ 復原 (Ctrl+Z)</button>

</body>
</html>
